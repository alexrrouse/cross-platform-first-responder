<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parity Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>Parity Viewer</h1>
        <div id="stats" class="stats"></div>
        <div class="search-box">
          <input type="text" id="search" placeholder="Filter snapshots..." autocomplete="off">
        </div>
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="paired">Paired</button>
          <button class="filter-btn" data-filter="ios-only">iOS Only</button>
          <button class="filter-btn" data-filter="android-only">Android Only</button>
        </div>
      </div>
      <ul id="snapshot-list" class="snapshot-list"></ul>
    </aside>

    <main id="viewer">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">&#x1F50D;</div>
        <h2>No snapshot selected</h2>
        <p>Select a snapshot from the sidebar to compare iOS and Android side by side.</p>
        <div id="config-info" class="config-info"></div>
      </div>

      <div id="compare-view" class="compare-view" style="display: none;">
        <div class="compare-pane">
          <div class="pane-header">
            <span class="platform-badge ios">iOS</span>
            <span id="ios-filename" class="filename"></span>
          </div>
          <div class="pane-body" id="ios-pane">
            <div class="missing-label" id="ios-missing" style="display: none;">No iOS snapshot</div>
            <img id="ios-image" alt="iOS snapshot">
          </div>
        </div>
        <div class="compare-divider"></div>
        <div class="compare-pane">
          <div class="pane-header">
            <span class="platform-badge android">Android</span>
            <span id="android-filename" class="filename"></span>
          </div>
          <div class="pane-body" id="android-pane">
            <div class="missing-label" id="android-missing" style="display: none;">No Android snapshot</div>
            <img id="android-image" alt="Android snapshot">
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
