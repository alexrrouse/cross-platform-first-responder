name: PR Checks — Cross-Platform Parity

on:
  pull_request:
    branches: [main, develop]

jobs:
  # Gate: Ensure test contracts are covered on both platforms
  test-parity:
    name: Validate Test Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check test contract coverage
        run: bash tools/ci/validate-test-parity.sh

  # iOS: Build, test, record videos
  ios-tests:
    name: iOS Tests + Video Recording
    runs-on: macos-15
    needs: test-parity
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project ios/TandemEMT.xcodeproj \
            -scheme TandemEMT \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -resultBundlePath artifacts/ios/TestResults.xcresult \
            -enableCodeCoverage YES \
            | xcpretty

      - name: Run UI tests with recording
        run: |
          xcodebuild test \
            -project ios/TandemEMT.xcodeproj \
            -scheme TandemEMTUITests \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -resultBundlePath artifacts/ios/UITestResults.xcresult \
            | xcpretty

      - name: Upload iOS test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-videos
          path: artifacts/ios/
          retention-days: 14

  # Android: Build, test, record videos
  android-tests:
    name: Android Tests + Video Recording
    runs-on: ubuntu-latest
    needs: test-parity
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Enable KVM (for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run UI tests with Gradle Managed Device
        working-directory: android
        run: ./gradlew pixel6Api34DebugAndroidTest

      - name: Upload Android test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-videos
          path: |
            android/app/build/reports/androidTests/
            android/app/build/outputs/managed_device_android_test_additional_output/
          retention-days: 14

  # Post video links as PR comment
  post-videos:
    name: Link Videos to PR
    runs-on: ubuntu-latest
    needs: [ios-tests, android-tests]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Comment video links on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## 📱 UI Test Recordings

            | Platform | Status | Artifacts |
            |----------|--------|-----------|
            | iOS | ${{ needs.ios-tests.result }} | [View recordings](${runUrl}#artifacts) |
            | Android | ${{ needs.android-tests.result }} | [View recordings](${runUrl}#artifacts) |

            > Download artifacts to compare platform behavior side-by-side.
            > Videos are retained for 14 days.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
